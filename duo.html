<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎵 뮤직 마스터</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
:root {
  --blue: #6A9FC5; --pink: #F5B5B0; --yellow: #D4C255; --green: #6bcb77;
  --red: #ef5350; --bg: #f5f5f5; --card: #fff; --text: #333; --sub: #999;
  --shadow: 0 4px 12px rgba(0,0,0,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ===== SCREENS ===== */
.screen { display:none; min-height:100vh; }
.screen.active { display:block; }

/* ===== TOP BAR ===== */
.top-bar { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--card); border-bottom:1px solid #eee; position:sticky; top:0; z-index:50; }
.top-bar .streak { display:flex; align-items:center; gap:4px; font-weight:700; color:#ff9800; font-size:15px; }
.top-bar .xp { display:flex; align-items:center; gap:4px; font-weight:700; color:var(--blue); font-size:15px; }
.top-bar .hearts { display:flex; align-items:center; gap:2px; font-size:15px; }
.top-bar .logo { height:32px; border-radius:8px; }

/* ===== HOME / SKILL TREE ===== */
.home-header { text-align:center; padding:20px 16px 10px; }
.home-header h2 { font-size:20px; color:var(--blue); }
.home-header p { font-size:13px; color:var(--sub); margin-top:4px; }

.daily-box { margin:12px 16px; padding:14px 18px; background:linear-gradient(135deg,#fff9e6,#fff3cc); border-radius:16px; display:flex; align-items:center; gap:12px; }
.daily-box .fire { font-size:32px; }
.daily-box .info h4 { font-size:14px; color:#e65100; }
.daily-box .info p { font-size:12px; color:#bf8c00; margin:0; }
.daily-box .goal-bar { flex:1; height:8px; background:#ffe0b2; border-radius:4px; overflow:hidden; margin-top:4px; }
.daily-box .goal-fill { height:100%; background:#ff9800; border-radius:4px; transition:width .5s; }

.path { display:flex; flex-direction:column; align-items:center; padding:20px 0 40px; gap:0; }
.path-node { position:relative; width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; cursor:pointer; transition:all .2s; border:4px solid; z-index:2; }
.path-node:hover { transform:scale(1.1); }
.path-node.locked { border-color:#ddd; background:#f0f0f0; cursor:not-allowed; opacity:0.5; }
.path-node.available { border-color:var(--blue); background:#e8f2fa; }
.path-node.completed { border-color:var(--green); background:#e8f5e9; }
.path-node.current { border-color:var(--blue); background:var(--blue); animation:pulse 2s infinite; }
.path-node .crown { position:absolute; top:-12px; font-size:18px; }
.path-connector { width:4px; height:32px; background:#ddd; z-index:1; }
.path-connector.done { background:var(--green); }
.path-node-label { font-size:12px; color:var(--sub); margin-top:-4px; margin-bottom:8px; font-weight:600; }

@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(106,159,197,0.4)} 50%{box-shadow:0 0 0 12px rgba(106,159,197,0)} }

/* ===== LESSON SCREEN ===== */
.lesson-bar { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--card); border-bottom:1px solid #eee; }
.lesson-bar .close-btn { font-size:24px; color:#999; cursor:pointer; background:none; border:none; }
.lesson-progress { flex:1; height:10px; background:#eee; border-radius:5px; overflow:hidden; }
.lesson-progress-fill { height:100%; background:var(--green); border-radius:5px; transition:width .4s; }
.lesson-hearts { display:flex; gap:2px; font-size:18px; }

.lesson-content { max-width:500px; margin:0 auto; padding:20px 16px; }
.question-area { min-height:300px; display:flex; flex-direction:column; align-items:center; justify-content:center; }

.q-prompt { font-size:18px; font-weight:700; text-align:center; margin-bottom:20px; color:var(--text); }
.q-sub { font-size:14px; color:var(--sub); text-align:center; margin-bottom:16px; }

/* Staff display */
.q-staff { width:100%; max-width:400px; height:160px; background:#fafafa; border-radius:16px; margin-bottom:16px; }

/* Answer options */
.options { display:grid; gap:10px; width:100%; max-width:400px; }
.options.cols-2 { grid-template-columns:1fr 1fr; }
.options.cols-3 { grid-template-columns:1fr 1fr 1fr; }
.options.cols-4 { grid-template-columns:1fr 1fr 1fr 1fr; }
.opt-btn { padding:16px; border:2px solid #e0e0e0; border-radius:14px; background:var(--card); font-size:18px; font-weight:700; cursor:pointer; transition:all .2s; text-align:center; }
.opt-btn:hover { border-color:var(--blue); background:#f0f7ff; }
.opt-btn:active { transform:scale(0.96); }
.opt-btn.selected { border-color:var(--blue); background:#e3f0ff; }
.opt-btn.correct { border-color:var(--green); background:#e8f5e9; color:var(--green); animation:popIn .3s; }
.opt-btn.wrong { border-color:var(--red); background:#ffebee; color:var(--red); animation:shake .3s; }

@keyframes popIn { 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

/* Play button for ear training */
.play-btn { width:80px; height:80px; border-radius:50%; background:var(--blue); border:none; color:#fff; font-size:32px; cursor:pointer; margin-bottom:20px; transition:all .2s; box-shadow:0 4px 15px rgba(106,159,197,0.3); }
.play-btn:hover { transform:scale(1.1); }
.play-btn:active { transform:scale(0.95); }

/* Tap area for rhythm */
.rhythm-tap { width:100%; max-width:400px; height:80px; border-radius:20px; background:linear-gradient(135deg,var(--pink),#e8a0a0); display:flex; align-items:center; justify-content:center; font-size:20px; color:#fff; font-weight:700; cursor:pointer; margin:12px 0; transition:all .1s; user-select:none; }
.rhythm-tap:active { transform:scale(0.96); background:linear-gradient(135deg,#e08080,var(--pink)); }

/* Bottom result bar */
.result-bar { position:fixed; bottom:0; left:0; right:0; padding:16px 20px; z-index:40; display:flex; align-items:center; justify-content:space-between; transition:all .3s; transform:translateY(100%); }
.result-bar.show { transform:translateY(0); }
.result-bar.correct-bar { background:#d4edda; border-top:2px solid var(--green); }
.result-bar.wrong-bar { background:#f8d7da; border-top:2px solid var(--red); }
.result-bar .result-text { font-weight:700; font-size:16px; }
.result-bar.correct-bar .result-text { color:var(--green); }
.result-bar.wrong-bar .result-text { color:var(--red); }
.continue-btn { padding:12px 28px; border:none; border-radius:12px; font-size:16px; font-weight:700; color:#fff; cursor:pointer; }
.result-bar.correct-bar .continue-btn { background:var(--green); }
.result-bar.wrong-bar .continue-btn { background:var(--red); }

/* ===== LESSON COMPLETE ===== */
.complete-screen { text-align:center; padding:40px 20px; }
.complete-screen .trophy { font-size:80px; margin-bottom:16px; }
.complete-screen h2 { font-size:26px; margin-bottom:8px; }
.complete-screen p { color:var(--sub); margin-bottom:24px; }
.xp-earned { display:inline-block; background:linear-gradient(135deg,var(--blue),#5a8fb5); color:#fff; padding:12px 28px; border-radius:14px; font-size:20px; font-weight:800; margin-bottom:20px; }
.complete-stats { display:flex; justify-content:center; gap:20px; margin-bottom:28px; }
.complete-stat { text-align:center; }
.complete-stat .val { font-size:24px; font-weight:800; color:var(--blue); }
.complete-stat .lbl { font-size:11px; color:var(--sub); }
.home-btn { padding:14px 36px; border:none; border-radius:14px; font-size:17px; font-weight:700; cursor:pointer; background:var(--blue); color:#fff; transition:all .2s; }
.home-btn:hover { transform:scale(1.05); }

/* ===== FAIL SCREEN ===== */
.fail-screen { text-align:center; padding:40px 20px; }
.fail-screen .sad { font-size:80px; margin-bottom:16px; }
.fail-screen h2 { font-size:24px; margin-bottom:8px; }
.fail-screen p { color:var(--sub); margin-bottom:24px; }
.retry-btn { padding:14px 36px; border:none; border-radius:14px; font-size:17px; font-weight:700; cursor:pointer; background:var(--red); color:#fff; margin-right:8px; }

/* ===== UNIT DIVIDERS ===== */
.path-unit { font-size:11px; color:var(--sub); background:#eee; padding:4px 14px; border-radius:10px; margin:8px 0; font-weight:700; letter-spacing:1px; }

/* ===== RESPONSIVE ===== */
@media(max-width:400px) {
  .path-node { width:62px; height:62px; font-size:24px; }
  .opt-btn { padding:12px; font-size:16px; }
}
</style>
</head>
<body>

<!-- ===== HOME SCREEN ===== -->
<div id="screen-home" class="screen active">
  <div class="top-bar">
    <img src="logo.jpg" class="logo" alt="logo">
    <div class="streak"><span>🔥</span><span id="home-streak">0</span></div>
    <div class="xp"><span>⚡</span><span id="home-xp">0</span> XP</div>
  </div>

  <div class="home-header">
    <h2>🎵 뮤직 마스터</h2>
    <p>매일 조금씩 음악 실력을 키워요!</p>
  </div>

  <div class="daily-box">
    <div class="fire">🔥</div>
    <div class="info" style="flex:1">
      <h4 id="daily-title">오늘의 목표</h4>
      <p id="daily-desc">레슨 1개 완료하기</p>
      <div class="goal-bar"><div class="goal-fill" id="daily-fill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="path" id="skill-path"></div>

  <div style="text-align:center;padding:0 16px 30px">
    <a href="play.html" style="color:var(--blue);font-size:14px">🎮 미니게임 하러가기</a>
  </div>
</div>

<!-- ===== LESSON SCREEN ===== -->
<div id="screen-lesson" class="screen">
  <div class="lesson-bar">
    <button class="close-btn" onclick="exitLesson()">✕</button>
    <div class="lesson-progress"><div class="lesson-progress-fill" id="lesson-progress"></div></div>
    <div class="lesson-hearts" id="lesson-hearts"></div>
  </div>
  <div class="lesson-content">
    <div class="question-area" id="question-area"></div>
  </div>
  <div class="result-bar" id="result-bar">
    <div class="result-text" id="result-text"></div>
    <button class="continue-btn" onclick="nextQuestion()">계속</button>
  </div>
</div>

<!-- ===== COMPLETE SCREEN ===== -->
<div id="screen-complete" class="screen">
  <div class="complete-screen">
    <div class="trophy">🏆</div>
    <h2>레슨 완료!</h2>
    <p id="complete-msg"></p>
    <div class="xp-earned" id="complete-xp">+20 XP</div>
    <div class="complete-stats">
      <div class="complete-stat"><div class="val" id="c-correct">0</div><div class="lbl">정답</div></div>
      <div class="complete-stat"><div class="val" id="c-total">0</div><div class="lbl">문제</div></div>
      <div class="complete-stat"><div class="val" id="c-accuracy">0%</div><div class="lbl">정답률</div></div>
    </div>
    <button class="home-btn" onclick="goHome()">계속하기</button>
  </div>
</div>

<!-- ===== FAIL SCREEN ===== -->
<div id="screen-fail" class="screen">
  <div class="fail-screen">
    <div class="sad">😢</div>
    <h2>하트를 다 잃었어요</h2>
    <p>괜찮아요! 다시 도전해봐요 💪</p>
    <button class="retry-btn" onclick="retryLesson()">다시 도전</button>
    <button class="home-btn" onclick="goHome()">홈으로</button>
  </div>
</div>

// ============================================================
// STATE
// ============================================================
const STORE_KEY = 'music_duo_v1';
let DATA;
function load() {
  try { DATA = JSON.parse(localStorage.getItem(STORE_KEY)); } catch(e){}
  if (!DATA) DATA = { xp:0, streak:0, lastDay:null, skills:{}, dailyLessons:0, dailyDate:null };
}
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(DATA)); }

function getSkillState(id) { return DATA.skills[id] || { lessonsCompleted:0, unlocked: id===SKILLS[0].id }; }
function setSkillState(id, s) { DATA.skills[id] = s; save(); }

let synth, toneStarted = false;
async function ensureTone() { if(!toneStarted){await Tone.start();toneStarted=true;} if(!synth) synth=new Tone.Synth({oscillator:{type:'triangle'},envelope:{attack:0.02,decay:0.25,sustain:0.2,release:0.4}}).toDestination(); }
function playN(name) { ensureTone().then(()=>{ const f=NOTE_FREQ[name]; if(f) synth.triggerAttackRelease(f,'8n'); }); }
function playFreq(f) { ensureTone().then(()=>synth.triggerAttackRelease(f,'8n')); }
function playCorrectSfx() { ensureTone().then(()=>{ const s=new Tone.Synth({oscillator:{type:'sine'},envelope:{attack:0.01,decay:0.1,sustain:0.05,release:0.2}}).toDestination(); s.triggerAttackRelease('E5','16n'); setTimeout(()=>{s.triggerAttackRelease('G5','16n');},100); setTimeout(()=>s.dispose(),500); }); }
function playWrongSfx() { ensureTone().then(()=>{ const s=new Tone.Synth({oscillator:{type:'sawtooth'},envelope:{attack:0.01,decay:0.2,sustain:0,release:0.1}}).toDestination(); s.volume.value=-10; s.triggerAttackRelease('C3','8n'); setTimeout(()=>s.dispose(),500); }); }

function rand(a) { return a[Math.floor(Math.random()*a.length)]; }
function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
function todayStr() { return new Date().toISOString().slice(0,10); }

// ============================================================
// HOME
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

function goHome() {
  showScreen('home');
  renderHome();
}

function renderHome() {
  load();
  // Streak
  const today = todayStr();
  if (DATA.lastDay === today) { /* already played today */ }
  else if (DATA.lastDay === getYesterday()) { /* streak continues */ }
  else if (DATA.lastDay && DATA.lastDay !== today) { DATA.streak = 0; save(); }

  document.getElementById('home-streak').textContent = DATA.streak;
  document.getElementById('home-xp').textContent = DATA.xp;

  // Daily
  const dailyDone = (DATA.dailyDate === today) ? DATA.dailyLessons : 0;
  document.getElementById('daily-title').textContent = dailyDone >= 1 ? '오늘 목표 달성! 🎉' : '오늘의 목표';
  document.getElementById('daily-desc').textContent = `레슨 ${dailyDone} / 1 완료`;
  document.getElementById('daily-fill').style.width = Math.min(100, dailyDone * 100) + '%';

  // Skill path
  const path = document.getElementById('skill-path');
  path.innerHTML = '';

  const unitBreaks = {3:'📝 음표 이름 & 기호',7:'🥁 리듬',11:'👂 청음',14:'🎤 멜로디',16:'📚 음악 지식',18:'🏆 종합'};

  SKILLS.forEach((skill, idx) => {
    const st = getSkillState(skill.id);
    const totalLessons = skill.lessons.length;
    const completed = st.lessonsCompleted >= totalLessons;
    const unlocked = st.unlocked;
    const isCurrent = unlocked && !completed;

    if (unitBreaks[idx]) {
      const unit = document.createElement('div');
      unit.className = 'path-unit';
      unit.textContent = unitBreaks[idx];
      path.appendChild(unit);
    }

    if (idx > 0 && !unitBreaks[idx]) {
      const conn = document.createElement('div');
      conn.className = 'path-connector' + (getSkillState(SKILLS[idx-1].id).lessonsCompleted >= SKILLS[idx-1].lessons.length ? ' done' : '');
      path.appendChild(conn);
    }

    const node = document.createElement('div');
    node.className = 'path-node ' + (completed ? 'completed' : isCurrent ? 'current' : unlocked ? 'available' : 'locked');
    node.textContent = skill.icon;
    if (completed) node.innerHTML = skill.icon + '<span class="crown">👑</span>';
    if (unlocked) node.onclick = () => openSkill(idx);
    path.appendChild(node);

    const label = document.createElement('div');
    label.className = 'path-node-label';
    label.textContent = skill.label + (completed ? ' ✓' : unlocked ? ` (${st.lessonsCompleted}/${totalLessons})` : ' 🔒');
    path.appendChild(label);
  });
}

function getYesterday() {
  const d = new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10);
}

// ============================================================
// SKILL / LESSON START
// ============================================================
let currentSkillIdx, currentLessonIdx, lessonState;

function openSkill(skillIdx) {
  const skill = SKILLS[skillIdx];
  const st = getSkillState(skill.id);
  if (!st.unlocked) return;
  currentSkillIdx = skillIdx;
  currentLessonIdx = Math.min(st.lessonsCompleted, skill.lessons.length - 1);
  startLesson();
}

function startLesson() {
  ensureTone();
  const skill = SKILLS[currentSkillIdx];
  const lesson = skill.lessons[currentLessonIdx];

  const questions = generateQuestions(lesson);
  lessonState = {
    questions,
    current: 0,
    hearts: 5,
    correct: 0,
    total: questions.length,
    xpEarned: 0,
    answered: false,
  };

  showScreen('lesson');
  renderHearts();
  updateLessonProgress();
  showQuestion();
}

function retryLesson() { startLesson(); }
function exitLesson() { goHome(); }

// ============================================================
// QUESTION GENERATION
// ============================================================
function generateQuestions(lesson) {
  const qs = [];
  const pool = lesson.notePool || NOTE_NAMES;
  const count = lesson.qCount || 8;

  for (let i = 0; i < count; i++) {
    const r = Math.random();
    const t = lesson.type;

    if (t === 'slur-intro') { qs.push(genSlurIntroQ()); }
    else if (t === 'slur-quiz') { qs.push(genSlurQuizQ()); }
    else if (t === 'staccato-intro') { qs.push(genStaccatoIntroQ()); }
    else if (t === 'staccato-ear') { qs.push(genStaccatoEarQ()); }
    else if (t === 'rhythm-quiz') { qs.push(genRhythmQuizQ()); }
    else if (t === 'note-name') { qs.push(Math.random()>0.3 ? genNoteNameQ() : genRestQ()); }
    else if (t === 'note-name-beats') { qs.push(genNoteNameBeatsQ()); }
    else if (t === 'accidental-intro') { qs.push(genAccidentalIntroQ()); }
    else if (t === 'accidental-read') { qs.push(genAccidentalReadQ()); }
    else if (t === 'accidental-ear') { qs.push(genAccidentalEarQ()); }
    else if (t === 'melody') { qs.push(genMelodyQ(pool)); }
    else if (t === 'rhythm') { qs.push(genRhythmQ()); }
    else if (t === 'rhythm-tap') { qs.push(genRhythmTapQ()); }
    else if (t === 'rhythm-compare') { qs.push(genRhythmCompareQ()); }
    else if (t === 'high-low') { qs.push(genHighLowQ(pool)); }
    else if (t === 'interval') { qs.push(genIntervalQ()); }
    else if (t === 'direction') { qs.push(genDirectionQ(pool)); }
    else if (t === 'dynamics') { qs.push(genDynamicsQ()); }
    else if (t === 'tempo') { qs.push(genTempoQ()); }
    else {
      // Mixed
      if (lesson.earFocus && r < 0.4) qs.push(genEarQ(pool));
      else if (lesson.engMode && r < 0.3) qs.push(genEngQ(pool));
      else if (r < 0.5) qs.push(genStaffQ(pool));
      else if (r < 0.75) qs.push(genEarQ(pool));
      else qs.push(genMatchQ(pool));
    }
  }
  return qs;
}

function genStaffQ(pool) {
  const note = rand(pool);
  const opts = shuffle(pool).slice(0, Math.min(4, pool.length));
  if (!opts.includes(note)) opts[0] = note;
  return { type:'staff', note, options:shuffle(opts), answer:note, prompt:'이 음의 이름은?' };
}

function genEarQ(pool) {
  const note = rand(pool);
  const opts = shuffle(pool).slice(0, Math.min(4, pool.length));
  if (!opts.includes(note)) opts[0] = note;
  return { type:'ear', note, freq:NOTE_FREQ[note], options:shuffle(opts), answer:note, prompt:'어떤 음일까요? 🔊' };
}

function genEngQ(pool) {
  const note = rand(pool);
  const opts = shuffle(pool).slice(0, Math.min(4, pool.length));
  if (!opts.includes(note)) opts[0] = note;
  return { type:'eng', note, answer:NOTE_ENG[note], options:shuffle(opts.map(n=>NOTE_ENG[n])), prompt:`"${note}"의 영어 계이름은?` };
}

function genMatchQ(pool) {
  const note = rand(pool);
  return { type:'match', note, freq:NOTE_FREQ[note], answer:note, prompt:'오선지의 음과 소리를 듣고 이름을 고르세요',
    options: shuffle(pool.slice(0, Math.min(4, pool.length)).includes(note) ? pool.slice(0, Math.min(4, pool.length)) : [note, ...pool.filter(n=>n!==note).slice(0,3)]) };
}

function genMelodyQ(pool) {
  const len = 3 + Math.floor(Math.random()*2);
  const melody = [];
  for(let i=0;i<len;i++) melody.push(rand(pool));
  const missing = Math.floor(Math.random()*len);
  const answer = melody[missing];
  const opts = shuffle(pool).slice(0, Math.min(4, pool.length));
  if(!opts.includes(answer)) opts[0] = answer;
  return { type:'melody', melody, missing, answer, options:shuffle(opts),
    prompt:'빈칸에 들어갈 음은?' };
}

function genRhythmQ() {
  const rhythms = [
    { name:'4분음표', beats:1, filled:true, stem:true, flag:0 },
    { name:'2분음표', beats:2, filled:false, stem:true, flag:0 },
    { name:'온음표', beats:4, filled:false, stem:false, flag:0 },
    { name:'8분음표', beats:0.5, filled:true, stem:true, flag:1 },
  ];
  const chosen = rand(rhythms);
  const opts = shuffle(rhythms).slice(0,4).map(r=>r.name);
  if(!opts.includes(chosen.name)) opts[0] = chosen.name;
  return { type:'rhythm-id', rhythm:chosen, answer:chosen.name, options:shuffle(opts),
    prompt:'이 음표의 이름은?' };
}

// --- 이음줄/붙임줄 ---
function genSlurIntroQ() {
  const r = Math.random();
  if (r < 0.35) {
    // 이음줄 vs 붙임줄 구분
    const isTie = Math.random()>0.5;
    return { type:'slur-concept', answer: isTie ? '붙임줄' : '이음줄',
      options: shuffle(['이음줄','붙임줄']),
      prompt: isTie ? '같은 높이의 두 음을 이어서\n길게 연주하는 줄은?' : '다른 높이의 음을 부드럽게\n이어서 연주하는 줄은?',
      info: isTie ? '붙임줄 = 같은 음끼리 연결 → 박자를 합침' : '이음줄 = 다른 음끼리 연결 → 부드럽게 레가토' };
  } else if (r < 0.7) {
    // 붙임줄 박자 계산
    const combos = [
      {a:'4분음표',b:'4분음표',aBeats:1,bBeats:1,total:'2박'},
      {a:'2분음표',b:'4분음표',aBeats:2,bBeats:1,total:'3박'},
      {a:'2분음표',b:'2분음표',aBeats:2,bBeats:2,total:'4박'},
      {a:'4분음표',b:'8분음표',aBeats:1,bBeats:0.5,total:'1.5박'},
      {a:'온음표',b:'4분음표',aBeats:4,bBeats:1,total:'5박'},
    ];
    const chosen = rand(combos);
    const opts = shuffle(['1.5박','2박','3박','4박','5박']).slice(0,4);
    if(!opts.includes(chosen.total)) opts[0]=chosen.total;
    return { type:'tie-calc', combo:chosen, answer:chosen.total, options:shuffle(opts),
      prompt:`${chosen.a} + ${chosen.b}을 붙임줄로 이으면?` };
  } else {
    // 그림 보고 이음줄/붙임줄 구분
    const isTie = Math.random()>0.5;
    return { type:'slur-visual', isTie, answer: isTie ? '붙임줄' : '이음줄',
      options: shuffle(['이음줄','붙임줄']),
      prompt: '이 그림은 이음줄일까요, 붙임줄일까요?' };
  }
}

function genSlurQuizQ() {
  const r = Math.random();
  if (r < 0.5) return genSlurIntroQ();
  // 레가토 vs 스타카토 구분 퀴즈
  const isLegato = Math.random()>0.5;
  return { type:'slur-concept', answer: isLegato ? '레가토(부드럽게)' : '스타카토(짧게)',
    options: shuffle(['레가토(부드럽게)','스타카토(짧게)']),
    prompt: isLegato ? '이음줄이 있을 때의 연주법은?' : '음표 위에 점이 있을 때의 연주법은?' };
}

// --- 스타카토 ---
function genStaccatoIntroQ() {
  const r = Math.random();
  if (r < 0.4) {
    // 스타카토 뜻
    const opts = shuffle(['짧게 끊어서','길게 늘여서','점점 세게','점점 여리게']);
    return { type:'staccato-meaning', answer:'짧게 끊어서', options:opts,
      prompt:'스타카토(staccato)의 뜻은?' };
  } else if (r < 0.7) {
    // 기호 맞추기
    const symbols = [
      {name:'스타카토',symbol:'•',desc:'음표 위/아래 점'},
      {name:'악센트',symbol:'>',desc:'그 음을 세게'},
      {name:'테누토',symbol:'ㅡ',desc:'충분히 길게'},
      {name:'페르마타',symbol:'𝄐',desc:'늘임표 — 길게 늘여서'},
    ];
    const chosen = rand(symbols);
    const opts = shuffle(symbols).slice(0,4).map(s=>s.name);
    if(!opts.includes(chosen.name)) opts[0]=chosen.name;
    return { type:'articulation-id', symbol:chosen, answer:chosen.name, options:shuffle(opts),
      prompt:`이 기호 "${chosen.symbol}" 는?`, sub:chosen.desc };
  } else {
    // 스타카토 vs 레가토
    const isStacc = Math.random()>0.5;
    return { type:'staccato-concept', answer: isStacc ? '스타카토' : '레가토',
      options: shuffle(['스타카토','레가토']),
      prompt: isStacc ? '짧고 가볍게 끊어서 연주하는 것은?' : '부드럽고 매끄럽게 이어서 연주하는 것은?' };
  }
}

function genStaccatoEarQ() {
  const isStacc = Math.random()>0.5;
  return { type:'staccato-ear', isStaccato:isStacc,
    answer: isStacc ? '스타카토 (짧게)' : '레가토 (길게)',

}

// --- 리듬 퀴즈 ---
function genRhythmQuizQ() {
  const r = Math.random();
  if (r < 0.4) {
    // 4/4박자에서 빈칸 채우기: _ + 나머지 = 4박
    const given = rand([{name:'2분음표',beats:2},{name:'4분음표',beats:1},{name:'온음표',beats:4}]);
    const remaining = 4 - given.beats;
    if (remaining <= 0) {
      return { type:'rhythm-fill', answer:'없어요 (이미 4박)', options:shuffle(['4분음표','2분음표','없어요 (이미 4박)','8분음표']),
        prompt:`4/4박자에서 ${given.name}(${given.beats}박) 다음에\n뭐가 필요할까요?` };
    }
    const ansName = remaining===1?'4분음표':remaining===2?'2분음표':remaining===3?'점2분음표':'없어요';
    const opts = shuffle(['4분음표','2분음표','점2분음표','8분음표']).slice(0,4);
    if(!opts.includes(ansName)) opts[0]=ansName;
    return { type:'rhythm-fill', answer:ansName, options:shuffle(opts),
      prompt:`4/4박자: ${given.name}(${given.beats}박) + ? = 4박\n빈칸에 들어갈 음표는?` };
  } else if (r < 0.7) {
    // 총 박자 계산
    const combos = [
      {notes:'♩ + ♩ + ♩ + ♩',total:'4박'},
      {notes:'𝅗𝅥 + 𝅗𝅥',total:'4박'},
      {notes:'𝅗𝅥 + ♩ + ♩',total:'4박'},
      {notes:'♩ + ♩ + 𝅗𝅥',total:'4박'},
      {notes:'♩ + ♪ + ♪',total:'2박'},
      {notes:'𝅝',total:'4박'},
      {notes:'♩ + ♩',total:'2박'},
      {notes:'♩ + ♩ + ♩',total:'3박'},
    ];
    const chosen = rand(combos);
    const opts = shuffle(['2박','3박','4박','5박']).slice(0,4);
    if(!opts.includes(chosen.total)) opts[0]=chosen.total;
    return { type:'rhythm-total', answer:chosen.total, options:shuffle(opts),
      prompt:`${chosen.notes}\n= 총 몇 박?` };
  } else {
    // 박자표 문제
    const meters = [
      {sign:'4/4',meaning:'한 마디에 4분음표 4개',beats:4},
      {sign:'3/4',meaning:'한 마디에 4분음표 3개',beats:3},
      {sign:'2/4',meaning:'한 마디에 4분음표 2개',beats:2},
      {sign:'6/8',meaning:'한 마디에 8분음표 6개',beats:6},
    ];
    const chosen = rand(meters);
    const opts = shuffle(meters).slice(0,4).map(m=>m.meaning);
    if(!opts.includes(chosen.meaning)) opts[0]=chosen.meaning;
    return { type:'meter', answer:chosen.meaning, options:shuffle(opts),
      prompt:`"${chosen.sign}" 박자의 뜻은?` };
  }
}

// --- 샵/플랫 기호 소개 ---
function genAccidentalIntroQ() {
  const r = Math.random();
  if (r < 0.4) {
    // 기호 → 이름
    const chosen = rand(ACCIDENTALS);
    const opts = shuffle(ACCIDENTALS).map(a=>a.name);
    return { type:'accidental-symbol', accidental:chosen, answer:chosen.name, options:shuffle(opts),
      prompt:`이 기호 "${chosen.symbol}" 의 이름은?` };
  } else if (r < 0.7) {
    // 기호 → 뜻
    const chosen = rand(ACCIDENTALS);
    const opts = shuffle(ACCIDENTALS).map(a=>a.desc);
    return { type:'accidental-meaning', accidental:chosen, answer:chosen.desc, options:shuffle(opts),
      prompt:`"${chosen.symbol} ${chosen.name}" 의 뜻은?` };
  } else {
    // 이명동음: 도♯ = 레♭?
    const idx = Math.floor(Math.random()*SHARP_NOTES.length);
    const sharp = SHARP_NOTES[idx];
    const flat = FLAT_NOTES[idx];
    return { type:'enharmonic', answer:'같은 음이에요!',
      options:shuffle(['같은 음이에요!','다른 음이에요!']),
      prompt:`${sharp.kr}과 ${flat.kr}는 같은 음일까요?`,
      sub:`${sharp.kr}은 ${sharp.between[0]}과 ${sharp.between[1]} 사이` };
  }
}

// --- 샵/플랫 오선지 읽기 ---
function genAccidentalReadQ() {
  const useSharp = Math.random() > 0.5;
  const note = useSharp ? rand(SHARP_NOTES) : rand(FLAT_NOTES);
  const allNotes = [...SHARP_NOTES.map(n=>n.kr), ...FLAT_NOTES.map(n=>n.kr)];
  const opts = shuffle(allNotes).slice(0,4);
  if(!opts.includes(note.kr)) opts[0]=note.kr;
  return { type:'accidental-read', note, isSharp:useSharp, answer:note.kr, options:shuffle(opts),
    prompt:'이 음의 이름은?' };
}

// --- 샵/플랫 청음 ---
function genAccidentalEarQ() {
  const baseNote = rand(['도','레','파','솔','라']);
  const goSharp = Math.random()>0.5;
  const answer = goSharp ? '반음 올라갔어요 ♯' : '반음 내려갔어요 ♭';
  return { type:'accidental-ear', baseNote, goSharp, answer,
    options:shuffle(['반음 올라갔어요 ♯','반음 내려갔어요 ♭']),
    prompt:'원래 음과 비교해서 어떻게 변했나요? 🎧' };
}

// --- 높낮이 비교 ---
function genHighLowQ(pool) {
  let a,b;
  do { a=rand(pool); b=rand(pool); } while(a===b);
  const idxA = NOTE_NAMES.indexOf(a), idxB = NOTE_NAMES.indexOf(b);
  const higher = idxA > idxB ? a : b;
  return { type:'high-low', noteA:a, noteB:b, answer:higher,
    options:shuffle([a,b]), prompt:'두 음을 듣고, 더 높은 음을 고르세요 🎧' };
}

// --- 음 방향 (올라가는/내려가는) ---
function genDirectionQ(pool) {
  const len = 3 + Math.floor(Math.random()*2);
  const startIdx = Math.floor(Math.random()*(pool.length-len));
  const goUp = Math.random()>0.5;
  const melody = [];
  for(let i=0;i<len;i++) melody.push(pool[goUp ? startIdx+i : startIdx+len-1-i]);
  const answer = goUp ? '올라가요 ⬆️' : '내려가요 ⬇️';
  return { type:'direction', melody, answer, options:['올라가요 ⬆️','내려가요 ⬇️'],
    prompt:'이 멜로디는 올라갈까요, 내려갈까요?' };
}

// --- 음정 ---
function genIntervalQ() {
  const chosen = rand(INTERVALS.slice(0,4)); // 초반엔 2~5도
  const opts = shuffle(INTERVALS.slice(0,5)).slice(0,4).map(v=>v.name);
  if(!opts.includes(chosen.name)) opts[0]=chosen.name;
  return { type:'interval', interval:chosen, answer:chosen.name, options:shuffle(opts),
    prompt:'두 음 사이의 간격은?' };
}

// --- 리듬 박수치기 ---
function genRhythmTapQ() {
  const patterns = [
    {name:'2박+2박', beats:[2,2], display:'𝅗𝅥  𝅗𝅥'},
    {name:'1+1+1+1', beats:[1,1,1,1], display:'♩ ♩ ♩ ♩'},
    {name:'1+1+2', beats:[1,1,2], display:'♩ ♩ 𝅗𝅥'},
    {name:'2+1+1', beats:[2,1,1], display:'𝅗𝅥 ♩ ♩'},
    {name:'1+2+1', beats:[1,2,1], display:'♩ 𝅗𝅥 ♩'},
    {name:'4박', beats:[4], display:'𝅝'},
  ];
  const chosen = rand(patterns);
  return { type:'rhythm-tap', pattern:chosen, answer:'done', prompt:'리듬에 맞춰 탭 하세요! 👏' };
}

// --- 음표 길이 비교 ---
function genRhythmCompareQ() {
  const notes = [
    {name:'온음표',beats:4},{name:'2분음표',beats:2},{name:'4분음표',beats:1},{name:'8분음표',beats:0.5}
  ];
  let a,b;
  do { a=rand(notes); b=rand(notes); } while(a.name===b.name);
  const longer = a.beats>b.beats ? a.name : b.name;
  return { type:'rhythm-compare', noteA:a, noteB:b, answer:longer,
    options:shuffle([a.name,b.name]), prompt:'어떤 음표가 더 길까요? ⏱️' };
}

// --- 셈여림 ---
function genDynamicsQ() {
  const r = Math.random();
  if (r < 0.5) {
    // 기호 → 이름
    const chosen = rand(DYNAMICS);
    const opts = shuffle(DYNAMICS).slice(0,4).map(d=>d.desc);
    if(!opts.includes(chosen.desc)) opts[0]=chosen.desc;
    return { type:'dynamics', dynamic:chosen, answer:chosen.desc, options:shuffle(opts),
      prompt:`"${chosen.symbol}" 는 무슨 뜻일까요?` };
  } else {
    // 순서: 어떤 게 더 센가
    let a,b;
    do { a=rand(DYNAMICS); b=rand(DYNAMICS); } while(a.symbol===b.symbol);
    const idxA=DYNAMICS.indexOf(a), idxB=DYNAMICS.indexOf(b);
    const louder = idxA>idxB ? a : b;
    return { type:'dynamics', answer:louder.symbol, options:shuffle([a.symbol,b.symbol]),
      prompt:'어떤 것이 더 세게 연주할까요? 🔊' };
  }
}

// --- 빠르기말 ---
function genTempoQ() {
  const r = Math.random();
  if (r < 0.5) {
    // 이름 → 뜻
    const chosen = rand(TEMPOS);
    const opts = shuffle(TEMPOS).slice(0,4).map(t=>t.desc);
    if(!opts.includes(chosen.desc)) opts[0]=chosen.desc;
    return { type:'tempo', tempo:chosen, answer:chosen.desc, options:shuffle(opts),
      prompt:`"${chosen.name}" 의 뜻은?` };
  } else {
    // 어떤 게 더 빠른가
    let a,b;
    do { a=rand(TEMPOS); b=rand(TEMPOS); } while(a.name===b.name);
    const idxA=TEMPOS.indexOf(a), idxB=TEMPOS.indexOf(b);
    const faster = idxA>idxB ? a : b;
    return { type:'tempo', answer:faster.name, options:shuffle([a.name,b.name]),
      prompt:'어떤 것이 더 빠를까요? 🏃' };
  }
}

// ============================================================
// RENDER QUESTION
// ============================================================
function showQuestion() {
  if (lessonState.current >= lessonState.total) { lessonComplete(); return; }
  if (lessonState.hearts <= 0) { lessonFail(); return; }

  lessonState.answered = false;
  hideResultBar();
  updateLessonProgress();

  const q = lessonState.questions[lessonState.current];
  const area = document.getElementById('question-area');

  let html = `<div class="q-prompt">${q.prompt}</div>`;

  if (q.type === 'staff' || q.type === 'match') {
    html += `<canvas class="q-staff" id="q-canvas" width="400" height="160"></canvas>`;
  }
  if (q.type === 'ear') {
    html += `<button class="play-btn" onclick="playEarQ()">🔊</button>`;
    html += `<div class="q-sub">버튼을 눌러 소리를 들어보세요</div>`;
  }
  if (q.type === 'match') {
    html += `<button class="play-btn" onclick="playEarQ()" style="width:60px;height:60px;font-size:24px;margin-bottom:12px">🔊</button>`;
  }
  if (q.type === 'melody') {
    html += `<canvas class="q-staff" id="q-canvas" width="400" height="160"></canvas>`;
    html += `<button class="play-btn" onclick="playMelodyQ()" style="width:60px;height:60px;font-size:24px;margin-bottom:12px">🔊</button>`;
  }
  if (q.type === 'rhythm-id') {
    html += `<canvas class="q-staff" id="q-canvas" width="200" height="160" style="max-width:200px"></canvas>`;
  }

  // 음표 이름 맞추기
  if (q.type === 'note-name-id' || q.type === 'note-beats') {
    html += `<canvas class="q-staff" id="q-canvas" width="200" height="160" style="max-width:200px"></canvas>`;
    if (q.noteType.desc) html += `<div class="q-sub">${q.noteType.desc}</div>`;
  }

  // 쉼표 맞추기
  if (q.type === 'rest-id') {
    html += `<canvas class="q-staff" id="q-canvas" width="200" height="160" style="max-width:200px"></canvas>`;
  }

  // 이음줄/붙임줄 비주얼
  if (q.type === 'slur-visual') {
    html += `<canvas class="q-staff" id="q-canvas" width="400" height="160"></canvas>`;
  }
  if (q.type === 'tie-calc') {
    html += `<div style="font-size:15px;color:var(--blue);margin-bottom:12px;background:#f0f7ff;padding:12px;border-radius:12px">🔗 ${q.combo.a}(${q.combo.aBeats}박) ＋ ${q.combo.b}(${q.combo.bBeats}박)</div>`;
  }
  if (q.info) {
    html += `<div class="q-sub" style="background:#f9f9f9;padding:8px 12px;border-radius:10px;margin-bottom:12px;font-size:13px">💡 ${q.info}</div>`;
  }

  // 스타카토 기호
  if (q.type === 'articulation-id') {
    html += `<div style="font-size:56px;margin-bottom:8px">${q.symbol.symbol}</div>`;
    if(q.sub) html += `<div class="q-sub">${q.sub}</div>`;
  }

  // 스타카토 청음
  if (q.type === 'staccato-ear') {
    html += `<button class="play-btn" onclick="playStaccatoEar()">🔊</button>`;
    html += `<div class="q-sub">들어보고 연주 방식을 맞춰보세요</div>`;
  }

  // 샵/플랫 기호
  if (q.type === 'accidental-symbol' || q.type === 'accidental-meaning') {
    html += `<div style="font-size:64px;margin-bottom:12px">${q.accidental.symbol}</div>`;
  }
  if (q.type === 'enharmonic') {
    html += `<div style="font-size:20px;margin-bottom:8px">🎹</div>`;
    if(q.sub) html += `<div class="q-sub">${q.sub}</div>`;
  }

  // 샵/플랫 오선지
  if (q.type === 'accidental-read') {
    html += `<canvas class="q-staff" id="q-canvas" width="400" height="160"></canvas>`;
  }

  // 샵/플랫 청음
  if (q.type === 'accidental-ear') {
    html += `<button class="play-btn" onclick="playAccidentalEar()">🔊</button>`;
    html += `<div class="q-sub">두 음을 비교해 들어보세요</div>`;
  }

  // 높낮이
  if (q.type === 'high-low') {
    html += `<div style="display:flex;gap:16px;margin-bottom:20px">`;
    html += `<button class="play-btn" onclick="playHighLow('A')" style="width:70px;height:70px">🔊<br><span style="font-size:12px">첫째 음</span></button>`;
    html += `<button class="play-btn" onclick="playHighLow('B')" style="width:70px;height:70px;background:var(--pink)">🔊<br><span style="font-size:12px">둘째 음</span></button>`;
    html += `</div>`;
  }

  // 음 방향
  if (q.type === 'direction') {
    html += `<canvas class="q-staff" id="q-canvas" width="400" height="160"></canvas>`;
    html += `<button class="play-btn" onclick="playDirectionQ()" style="width:60px;height:60px;font-size:24px;margin-bottom:12px">🔊</button>`;
  }

  // 음정
  if (q.type === 'interval') {
    html += `<div style="display:flex;gap:12px;margin-bottom:20px">`;
    html += `<button class="play-btn" onclick="playIntervalQ()" style="width:70px;height:70px">🔊<br><span style="font-size:11px">들어보기</span></button>`;
    html += `</div>`;
    html += `<div class="q-sub">${q.interval.ex[0]} → ${q.interval.ex[1]}</div>`;
  }

  // 리듬 박수
  if (q.type === 'rhythm-tap') {
    html += `<div class="q-sub" style="font-size:28px;margin-bottom:16px">${q.pattern.display}</div>`;
    html += `<div class="q-sub">패턴: ${q.pattern.name} (총 ${q.pattern.beats.reduce((a,b)=>a+b,0)}박)</div>`;
    html += `<div class="rhythm-tap" id="tap-area" onclick="handleTap()">👏 여기를 탭 하세요!</div>`;
    html += `<div class="q-sub" id="tap-status">리듬에 맞춰 탭 해보세요</div>`;
  }

  // 음표 길이 비교
  if (q.type === 'rhythm-compare') {
    html += `<div style="display:flex;gap:24px;justify-content:center;margin-bottom:20px">`;
    html += `<canvas id="rc-a" width="100" height="100" style="width:80px;height:80px;background:#fafafa;border-radius:12px"></canvas>`;
    html += `<canvas id="rc-b" width="100" height="100" style="width:80px;height:80px;background:#fafafa;border-radius:12px"></canvas>`;
    html += `</div>`;
  }

  // 셈여림 — 추가 비주얼 없음 (프롬프트에 다 있음)
  // 빠르기말 — 추가 비주얼 없음

  // 옵션 버튼 (rhythm-tap은 제외)
  if (q.type !== 'rhythm-tap') {
    const cols = q.options.length <= 2 ? 'cols-2' : q.options.length <= 3 ? 'cols-3' : 'cols-4';
    html += `<div class="options ${cols}">`;
    q.options.forEach((opt, i) => {
      html += `<button class="opt-btn" id="opt-${i}" onclick="selectAnswer(${i})">${opt}</button>`;
    });
    html += `</div>`;
  }

  area.innerHTML = html;

  // Draw canvas / play sounds after render
  setTimeout(() => {
    if (q.type === 'staff' || q.type === 'match') drawStaffQ(q);
    if (q.type === 'melody') drawMelodyQ(q);
    if (q.type === 'rhythm-id') drawRhythmQ(q);
    if (q.type === 'ear') setTimeout(playEarQ, 300);
    if (q.type === 'direction') { drawDirectionQ(q); setTimeout(playDirectionQ, 300); }
    if (q.type === 'high-low') setTimeout(()=>{playHighLow('A');setTimeout(()=>playHighLow('B'),800);}, 300);
    if (q.type === 'interval') setTimeout(playIntervalQ, 300);
    if (q.type === 'rhythm-compare') drawRhythmCompare(q);
    if (q.type === 'rhythm-tap') initTap(q);
    if (q.type === 'note-name-id' || q.type === 'note-beats') drawNoteTypeQ(q);
    if (q.type === 'rest-id') drawRestQ(q);
    if (q.type === 'accidental-read') drawAccidentalQ(q);
    if (q.type === 'accidental-ear') setTimeout(playAccidentalEar, 300);
    if (q.type === 'slur-visual') drawSlurVisual(q);
    if (q.type === 'staccato-ear') setTimeout(playStaccatoEar, 400);
  }, 50);
}

// ============================================================
// DRAW
// ============================================================
function noteY(n) { return{C4:95,D4:87,E4:79,F4:71,G4:63,A4:55,B4:47}[n]||63; }

function drawStaffQ(q) {
  const c = document.getElementById('q-canvas'); if(!c) return;
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,400,160);
  // staff
  ctx.strokeStyle='#bbb'; ctx.lineWidth=1.5;
  for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(40,35+i*15);ctx.lineTo(360,35+i*15);ctx.stroke();}
  // clef
  ctx.font='56px serif'; ctx.fillStyle='#6A9FC5'; ctx.fillText('𝄞',8,82);
  // note
  const freq = NOTE_FREQ[q.note];
  const y = noteY(freq);
  const x = 200;
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.ellipse(x,y,11,8,-0.2,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#333'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(x+10,y); ctx.lineTo(x+10,y-35); ctx.stroke();
  if(freq==='C4'){ctx.strokeStyle='#888';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x-16,95);ctx.lineTo(x+16,95);ctx.stroke();}
}

function drawMelodyQ(q) {
  const c = document.getElementById('q-canvas'); if(!c) return;
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,400,160);
  ctx.strokeStyle='#bbb'; ctx.lineWidth=1.5;
  for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(40,35+i*15);ctx.lineTo(360,35+i*15);ctx.stroke();}
  ctx.font='56px serif'; ctx.fillStyle='#6A9FC5'; ctx.fillText('𝄞',8,82);

  const spacing = 260 / q.melody.length;
  q.melody.forEach((note, i) => {
    const x = 90 + i * spacing;
    const freq = NOTE_FREQ[note];
    const y = noteY(freq);
    if (i === q.missing) {
      // question mark
      ctx.fillStyle='var(--red)'; ctx.font='bold 24px sans-serif'; ctx.textAlign='center';
      ctx.fillText('?', x, y+8); ctx.textAlign='start';
    } else {
      ctx.fillStyle='#333';
      ctx.beginPath(); ctx.ellipse(x,y,10,7,-0.2,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#333'; ctx.lineWidth=1.8;
      ctx.beginPath(); ctx.moveTo(x+9,y); ctx.lineTo(x+9,y-30); ctx.stroke();
      if(freq==='C4'){ctx.strokeStyle='#888';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x-14,95);ctx.lineTo(x+14,95);ctx.stroke();}
    }
  });
}

function drawRhythmQ(q) {
  const c = document.getElementById('q-canvas'); if(!c) return;
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,200,160);
  const r = q.rhythm;
  const cx=100, cy=100;
  ctx.fillStyle='#333'; ctx.strokeStyle='#333';

  if (!r.filled && !r.stem) {
    // 온음표
    ctx.lineWidth=3; ctx.beginPath(); ctx.ellipse(cx,cy,18,13,-0.2,0,Math.PI*2); ctx.stroke();
  } else if (!r.filled && r.stem) {
    // 2분음표
    ctx.lineWidth=3; ctx.beginPath(); ctx.ellipse(cx,cy,16,11,-0.2,0,Math.PI*2); ctx.stroke();
    ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(cx+15,cy); ctx.lineTo(cx+15,cy-50); ctx.stroke();
  } else if (r.filled && r.stem && r.flag===0) {
    // 4분음표
    ctx.beginPath(); ctx.ellipse(cx,cy,16,11,-0.2,0,Math.PI*2); ctx.fill();
    ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(cx+15,cy); ctx.lineTo(cx+15,cy-50); ctx.stroke();
  } else if (r.filled && r.stem && r.flag===1) {
    // 8분음표
    ctx.beginPath(); ctx.ellipse(cx,cy,16,11,-0.2,0,Math.PI*2); ctx.fill();
    ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(cx+15,cy); ctx.lineTo(cx+15,cy-50); ctx.stroke();
    ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(cx+15,cy-50);
    ctx.quadraticCurveTo(cx+32,cy-38,cx+20,cy-24); ctx.stroke();
  }
}

// ============================================================
// PLAY SOUNDS
// ============================================================
function playEarQ() {
  const q = lessonState.questions[lessonState.current];
  playN(q.note);
}
function playMelodyQ() {
  const q = lessonState.questions[lessonState.current];
  ensureTone().then(()=>{
    const now = Tone.now();
    q.melody.forEach((note,i) => {
      synth.triggerAttackRelease(NOTE_FREQ[note],'8n',now+i*0.4);
    });
  });
}

// --- 이음줄/붙임줄 그리기 ---
function drawSlurVisual(q) {
  const c=document.getElementById('q-canvas'); if(!c) return;
  const ctx=c.getContext('2d');ctx.clearRect(0,0,400,160);
  ctx.strokeStyle='#bbb';ctx.lineWidth=1.5;
  for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(40,35+i*15);ctx.lineTo(360,35+i*15);ctx.stroke();}
  ctx.font='56px serif';ctx.fillStyle='#6A9FC5';ctx.fillText('𝄞',8,82);

  if(q.isTie) {
    // 붙임줄: 같은 높이 두 음
    const y=noteY('E4');
    [150,250].forEach(x=>{
      ctx.fillStyle='#333';ctx.beginPath();ctx.ellipse(x,y,11,8,-0.2,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x+10,y);ctx.lineTo(x+10,y-35);ctx.stroke();
    });
    // 곡선
    ctx.strokeStyle='#e53935';ctx.lineWidth=2.5;ctx.beginPath();
    ctx.moveTo(155,y+12);ctx.quadraticCurveTo(200,y+30,245,y+12);ctx.stroke();
  } else {
    // 이음줄: 다른 높이 두 음
    const notes=[{x:140,f:'E4'},{x:200,f:'G4'},{x:260,f:'F4'}];
    notes.forEach(n=>{
      const y=noteY(n.f);
      ctx.fillStyle='#333';ctx.beginPath();ctx.ellipse(n.x,y,10,7,-0.2,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#333';ctx.lineWidth=1.8;ctx.beginPath();ctx.moveTo(n.x+9,y);ctx.lineTo(n.x+9,y-30);ctx.stroke();
    });
    // 곡선
    ctx.strokeStyle='#e53935';ctx.lineWidth=2.5;ctx.beginPath();
    const y0=noteY(notes[0].f), y2=noteY(notes[2].f);
    ctx.moveTo(145,y0-8);ctx.quadraticCurveTo(200,Math.min(y0,noteY('G4'))-25,255,y2-8);ctx.stroke();
  }
}

// --- 스타카토 청음 ---
function playStaccatoEar() {
  const q=lessonState.questions[lessonState.current];
  ensureTone().then(()=>{
    const now=Tone.now();
    const notes=['C4','E4','G4','C5'];
    if(q.isStaccato) {
      // 짧게 끊어서
      notes.forEach((n,i)=>synth.triggerAttackRelease(n,'32n',now+i*0.25));
    } else {
      // 길게 이어서
      notes.forEach((n,i)=>synth.triggerAttackRelease(n,'4n',now+i*0.4));
    }
  });
}

// --- 음표 이름 그리기 ---
function drawNoteTypeQ(q) {
  const c=document.getElementById('q-canvas'); if(!c) return;
  const ctx=c.getContext('2d');ctx.clearRect(0,0,200,160);
  const n=q.noteType, cx=100, cy=90;
  ctx.fillStyle='#333';ctx.strokeStyle='#333';
  if(!n.filled&&!n.stem){ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(cx,cy,18,13,-0.2,0,Math.PI*2);ctx.stroke();}
  else if(!n.filled&&n.stem){ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(cx,cy,16,11,-0.2,0,Math.PI*2);ctx.stroke();ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(cx+15,cy);ctx.lineTo(cx+15,cy-50);ctx.stroke();}
  else if(n.filled&&n.stem&&n.flag===0){ctx.beginPath();ctx.ellipse(cx,cy,16,11,-0.2,0,Math.PI*2);ctx.fill();ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(cx+15,cy);ctx.lineTo(cx+15,cy-50);ctx.stroke();}
  else if(n.filled&&n.stem&&n.flag===1){ctx.beginPath();ctx.ellipse(cx,cy,16,11,-0.2,0,Math.PI*2);ctx.fill();ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(cx+15,cy);ctx.lineTo(cx+15,cy-50);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+15,cy-50);ctx.quadraticCurveTo(cx+32,cy-38,cx+20,cy-24);ctx.stroke();}
  else if(n.filled&&n.stem&&n.flag===2){ctx.beginPath();ctx.ellipse(cx,cy,16,11,-0.2,0,Math.PI*2);ctx.fill();ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(cx+15,cy);ctx.lineTo(cx+15,cy-50);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+15,cy-50);ctx.quadraticCurveTo(cx+32,cy-38,cx+20,cy-24);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+15,cy-43);ctx.quadraticCurveTo(cx+32,cy-31,cx+20,cy-17);ctx.stroke();}
}

// --- 쉼표 그리기 ---
function drawRestQ(q) {
  const c=document.getElementById('q-canvas'); if(!c) return;
  const ctx=c.getContext('2d');ctx.clearRect(0,0,200,160);
  const n=q.noteType, cx=100;
  ctx.fillStyle='#333';ctx.strokeStyle='#333';
  // 오선 3줄만 (참고용)
  ctx.strokeStyle='#ccc';ctx.lineWidth=1;
  for(let i=1;i<=3;i++){ctx.beginPath();ctx.moveTo(40,50+i*16);ctx.lineTo(160,50+i*16);ctx.stroke();}
  ctx.fillStyle='#333';ctx.strokeStyle='#333';
  if(n.name==='온쉼표'){
    // 3번째 줄 아래에 매달린 사각형
    ctx.fillRect(cx-14,50+2*16,28,10);
  } else if(n.name==='2분쉼표'){
    // 3번째 줄 위에 올라간 사각형
    ctx.fillRect(cx-14,50+2*16-10,28,10);
  } else if(n.name==='4분쉼표'){
    // 간략한 4분쉼표 그림
    ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(cx-6,65);ctx.lineTo(cx+6,80);ctx.lineTo(cx-6,95);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-6,95);ctx.quadraticCurveTo(cx+8,105,cx-2,120);ctx.stroke();
    ctx.beginPath();ctx.arc(cx-6,120,5,0,Math.PI*2);ctx.fill();
    ctx.lineCap='butt';
  }
}

// --- 샵/플랫 오선지 ---
function drawAccidentalQ(q) {
  const c=document.getElementById('q-canvas'); if(!c) return;
  const ctx=c.getContext('2d');ctx.clearRect(0,0,400,160);
  ctx.strokeStyle='#bbb';ctx.lineWidth=1.5;
  for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(40,35+i*15);ctx.lineTo(360,35+i*15);ctx.stroke();}
  ctx.font='56px serif';ctx.fillStyle='#6A9FC5';ctx.fillText('𝄞',8,82);

  // 기본음 위치 찾기
  const baseNote = q.note.between[0];
  const baseFreq = NOTE_FREQ[baseNote];
  const baseY = noteY(baseFreq);
  // 샵/플랫 음은 기본음과 다음음 사이
  const nextNote = q.note.between[1];
  const nextFreq = NOTE_FREQ[nextNote];
  const nextY = noteY(nextFreq);
  const y = (baseY + nextY) / 2;
  const x = 220;

  // 변화표 기호
  ctx.font='bold 22px serif';ctx.fillStyle='#e53935';ctx.textAlign='center';
  ctx.fillText(q.isSharp ? '♯' : '♭', x-22, y+7);

  // 음표
  ctx.fillStyle='#333';ctx.textAlign='start';
  ctx.beginPath();ctx.ellipse(x,y,11,8,-0.2,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#333';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(x+10,y);ctx.lineTo(x+10,y-35);ctx.stroke();
}

// --- 샵/플랫 청음 ---
function playAccidentalEar() {
  const q=lessonState.questions[lessonState.current];
  const base=NOTE_FREQ[q.baseNote];
  ensureTone().then(()=>{
    const now=Tone.now();
    // 원래 음
    synth.triggerAttackRelease(base,'4n',now);
    // 반음 올리거나 내린 음
    const freq=Tone.Frequency(base).toFrequency();
    const altered=q.goSharp ? freq*Math.pow(2,1/12) : freq/Math.pow(2,1/12);
    setTimeout(()=>synth.triggerAttackRelease(altered,'4n'),700);
  });
}

// --- 높낮이 ---
function playHighLow(which) {
  const q = lessonState.questions[lessonState.current];
  playN(which==='A' ? q.noteA : q.noteB);
}

// --- 음 방향 ---
function drawDirectionQ(q) {
  const c = document.getElementById('q-canvas'); if(!c) return;
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,400,160);
  ctx.strokeStyle='#bbb'; ctx.lineWidth=1.5;
  for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(40,35+i*15);ctx.lineTo(360,35+i*15);ctx.stroke();}
  ctx.font='56px serif'; ctx.fillStyle='#6A9FC5'; ctx.fillText('𝄞',8,82);
  const spacing = 260 / q.melody.length;
  q.melody.forEach((note,i)=>{
    const x=90+i*spacing, freq=NOTE_FREQ[note], y=noteY(freq);
    ctx.fillStyle='#333';
    ctx.beginPath();ctx.ellipse(x,y,10,7,-0.2,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#333';ctx.lineWidth=1.8;
    ctx.beginPath();ctx.moveTo(x+9,y);ctx.lineTo(x+9,y-30);ctx.stroke();
    if(freq==='C4'){ctx.strokeStyle='#888';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x-14,95);ctx.lineTo(x+14,95);ctx.stroke();}
  });
}
function playDirectionQ() {
  const q = lessonState.questions[lessonState.current];
  ensureTone().then(()=>{
    const now=Tone.now();
    q.melody.forEach((note,i)=>synth.triggerAttackRelease(NOTE_FREQ[note],'8n',now+i*0.35));
  });
}

// --- 음정 ---
function playIntervalQ() {
  const q = lessonState.questions[lessonState.current];
  const notes = q.interval.ex;
  ensureTone().then(()=>{
    const now=Tone.now();
    synth.triggerAttackRelease(NOTE_FREQ[notes[0]],'4n',now);
    const secondNote = notes[1]==='도' && q.interval.semitones===12 ? 'C5' : NOTE_FREQ[notes[1]];
    synth.triggerAttackRelease(secondNote,'4n',now+0.6);
  });
}

// --- 음표 길이 비교 그리기 ---
function drawRhythmCompare(q) {
  [['rc-a',q.noteA],['rc-b',q.noteB]].forEach(([id,note])=>{
    const c=document.getElementById(id); if(!c) return;
    const ctx=c.getContext('2d'),cx=50,cy=55;
    ctx.fillStyle='#333';ctx.strokeStyle='#333';
    if(note.name==='온음표'){ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(cx,cy,16,12,-0.2,0,Math.PI*2);ctx.stroke();}
    else if(note.name==='2분음표'){ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(cx,cy,14,10,-0.2,0,Math.PI*2);ctx.stroke();ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(cx+13,cy);ctx.lineTo(cx+13,cy-35);ctx.stroke();}
    else if(note.name==='4분음표'){ctx.beginPath();ctx.ellipse(cx,cy,14,10,-0.2,0,Math.PI*2);ctx.fill();ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(cx+13,cy);ctx.lineTo(cx+13,cy-35);ctx.stroke();}
    else if(note.name==='8분음표'){ctx.beginPath();ctx.ellipse(cx,cy,14,10,-0.2,0,Math.PI*2);ctx.fill();ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(cx+13,cy);ctx.lineTo(cx+13,cy-35);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+13,cy-35);ctx.quadraticCurveTo(cx+26,cy-25,cx+17,cy-16);ctx.stroke();}
    ctx.font='12px sans-serif';ctx.fillStyle='#999';ctx.textAlign='center';
    ctx.fillText(note.name,cx,cy+30);
  });
}

// --- 리듬 박수치기 ---
let tapState = null;
function initTap(q) {
  const beats = q.pattern.beats;
  const totalBeats = beats.reduce((a,b)=>a+b,0);
  tapState = { beats, totalBeats, expectedTaps:beats.length, taps:[], startTime:null, done:false };
}
function handleTap() {
  if (!tapState || tapState.done) return;
  const now = performance.now();
  if (!tapState.startTime) tapState.startTime = now;
  tapState.taps.push(now);

  const el = document.getElementById('tap-area');
  el.style.transform = 'scale(0.95)';
  setTimeout(()=>el.style.transform='',100);
  playCorrectSfx();

  document.getElementById('tap-status').textContent = `탭: ${tapState.taps.length} / ${tapState.expectedTaps}`;

  if (tapState.taps.length >= tapState.expectedTaps) {
    tapState.done = true;
    // 간단 평가: 성공으로 처리
    setTimeout(()=>{
      lessonState.correct++;
      lessonState.answered = true;
      showResultBar(true, '잘 따라했어요! 👏🎉');
    }, 300);
  }
}

// ============================================================
// ANSWER
// ============================================================
function selectAnswer(idx) {
  if (lessonState.answered) return;
  lessonState.answered = true;

  const q = lessonState.questions[lessonState.current];
  const selected = q.options[idx];
  const correct = selected === q.answer;

  // Highlight
  q.options.forEach((opt, i) => {
    const btn = document.getElementById('opt-'+i);
    if (opt === q.answer) btn.classList.add('correct');
    if (i === idx && !correct) btn.classList.add('wrong');
  });

  if (correct) {
    lessonState.correct++;
    playCorrectSfx();
    showResultBar(true, '잘했어요! 🎉');
  } else {
    lessonState.hearts--;
    renderHearts();
    playWrongSfx();
    showResultBar(false, `정답: ${q.answer}`);
  }
}

function showResultBar(correct, text) {
  const bar = document.getElementById('result-bar');
  bar.className = 'result-bar show ' + (correct ? 'correct-bar' : 'wrong-bar');
  document.getElementById('result-text').textContent = text;
}
function hideResultBar() {
  document.getElementById('result-bar').className = 'result-bar';
}

function nextQuestion() {
  lessonState.current++;
  if (lessonState.hearts <= 0) { lessonFail(); return; }
  showQuestion();
}

// ============================================================
// LESSON END
// ============================================================
function lessonComplete() {
  const xp = 10 + lessonState.correct * 2;
  DATA.xp += xp;

  // Update skill progress
  const skill = SKILLS[currentSkillIdx];
  const st = getSkillState(skill.id);
  if (currentLessonIdx >= st.lessonsCompleted) {
    st.lessonsCompleted = currentLessonIdx + 1;
  }
  st.unlocked = true;
  setSkillState(skill.id, st);

  // Unlock next skill if this one is complete
  if (st.lessonsCompleted >= skill.lessons.length && currentSkillIdx < SKILLS.length - 1) {
    const nextSt = getSkillState(SKILLS[currentSkillIdx + 1].id);
    nextSt.unlocked = true;
    setSkillState(SKILLS[currentSkillIdx + 1].id, nextSt);
  }

  // Daily + streak
  const today = todayStr();
  if (DATA.dailyDate !== today) { DATA.dailyLessons = 0; DATA.dailyDate = today; }
  DATA.dailyLessons++;
  if (DATA.lastDay !== today) {
    if (DATA.lastDay === getYesterday()) DATA.streak++;
    else DATA.streak = 1;
    DATA.lastDay = today;
  }
  save();

  // Show
  const acc = lessonState.total > 0 ? Math.round(lessonState.correct / lessonState.total * 100) : 0;
  document.getElementById('complete-xp').textContent = `+${xp} XP`;
  document.getElementById('complete-msg').textContent = `${skill.label} 레슨 ${currentLessonIdx + 1} 완료!`;
  document.getElementById('c-correct').textContent = lessonState.correct;
  document.getElementById('c-total').textContent = lessonState.total;
  document.getElementById('c-accuracy').textContent = acc + '%';
  showScreen('complete');
}

function lessonFail() {
  showScreen('fail');
}

// ============================================================
// UI HELPERS
// ============================================================
function renderHearts() {
  const el = document.getElementById('lesson-hearts');
  el.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    el.innerHTML += i < lessonState.hearts ? '❤️' : '🖤';
  }
}

function updateLessonProgress() {
  const pct = lessonState.total > 0 ? (lessonState.current / lessonState.total * 100) : 0;
  document.getElementById('lesson-progress').style.width = pct + '%';
}

// ============================================================
// INIT
// ============================================================
load();
renderHome();
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 음악 게임</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:linear-gradient(135deg,#e8f0fe,#fce4ec,#fff3e0); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#333; padding:20px; }
.logo { width:180px; margin-bottom:16px; border-radius:20px; }
h1 { font-size:36px; margin-bottom:6px; color:#5b7fbf; }
p { color:#888; margin-bottom:30px; font-size:15px; }
.game-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; max-width:480px; width:100%; }
.game-card { background:#fff; border:2px solid #eee; border-radius:24px; padding:32px 18px; text-align:center; cursor:pointer; transition:all .3s; text-decoration:none; color:#333; box-shadow:0 4px 15px rgba(0,0,0,0.06); }
.game-card:hover { transform:translateY(-6px); border-color:#c5d5f0; background:#f8faff; box-shadow:0 12px 30px rgba(91,127,191,0.15); }
.game-card .icon { font-size:56px; margin-bottom:10px; }
.game-card h2 { font-size:18px; margin-bottom:4px; color:#5b7fbf; }
.game-card p { font-size:12px; color:#aaa; margin:0; }
@media(max-width:450px) { .game-grid { grid-template-columns:1fr; } }
</style>
</head>
<body>
  <img src="logo.jpg" class="logo" alt="Kids Mind Piano">
  <h1>🎵 음악 게임</h1>
  <p>재미있게 음악 실력을 키워봐요!</p>
  <div class="game-grid">
    <a class="game-card" href="duo.html" style="grid-column:1/-1;background:linear-gradient(135deg,#e8f2fa,#fce4ec);border-color:#6A9FC5">
      <div class="icon">🎓</div>
      <h2>뮤직 마스터</h2>
      <p>듀오링고 스타일로 단계별 학습!</p>
    </a>
    <a class="game-card" href="game.html">
      <div class="icon">🎮</div>
      <h2>리듬게임</h2>
      <p>노래에 맞춰 떨어지는 음표를 맞춰요!</p>
    </a>
    <a class="game-card" href="cards.html">
      <div class="icon">🃏</div>
      <h2>카드 뒤집기</h2>
      <p>같은 짝의 음표 카드를 찾아요!</p>
    </a>
    <a class="game-card" href="index.html">
      <div class="icon">📖</div>
      <h2>음악 훈련</h2>
      <p>악보읽기·리듬·시창·청음 연습</p>
    </a>
  </div>
</body>
</html>
